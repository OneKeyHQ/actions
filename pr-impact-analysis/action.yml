name: 'PR Impact Analysis'
description: 'Analyze PR impact via Cloudflare Worker (LLM + Jira)'
branding:
  icon: 'search'
  color: 'blue'
inputs:
  github-token:
    description: 'GitHub token to fetch PR diff'
    required: true
  worker-url:
    description: 'Cloudflare Worker endpoint URL'
    required: true
  worker-secret:
    description: 'Shared secret for Worker authentication'
    required: true
outputs:
  jira-issue-key:
    description: 'Created Jira issue key, e.g. OK-123 (empty if skipped)'
  jira-issue-url:
    description: 'URL to the created Jira issue (empty if skipped)'
  analysis-summary:
    description: 'LLM generated impact analysis summary'
  skipped:
    description: 'Whether QA was skipped (true/false)'
runs:
  using: 'node20'
  main: 'dist/index.js'
